services:
  demo:
    build: demo
    ports:
      - "80:8080"
    environment:
      DB_URL: jdbc:mysql://mydb:3306/demo
      DB_USER: root
      DB_PASSWORD: 1234
      DB_DRIVER: com.mysql.cj.jdbc.Driver
    restart: always
    depends_on:
      mydb:
        condition: service_healthy
  mydb:
    image: mysql:9.6
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: demo
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10