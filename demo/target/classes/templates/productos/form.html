<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Producto</title>
</head>
<body>
<h1 th:text="${producto.id} == null ? 'Nuevo Producto' : 'Editar Producto'"></h1>
<form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
    <input type="hidden" th:field="*{id}" />
    <div>
        <label>Nombre:</label>
        <input type="text" th:field="*{nombre}" required />
    </div>
    <div>
        <label>Precio:</label>
        <input type="number" step="0.01" th:field="*{precio}" required />
    </div>
    <div>
        <button type="submit">Guardar</button>
        <a th:href="@{/productos}">Cancelar</a>
    </div>
</form>
</body>
</html>
